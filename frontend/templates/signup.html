<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion.net | Sign Up</title>
    <style>
        body {
            background-color: #f9f9f9;
            font-family: 'Arial', sans-serif;
        }
        .signup-container {
            max-width: 500px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }
        input[type="submit"] {
            width: 100%;
            padding: 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
        }
        input[type="submit"]:hover {
            background-color: #4CAF50;
        }
        .error {
            text-align: center;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <h2>Create Your Account</h2>

    <!-- Display error messages -->
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('signup') }}" method="POST">
        <label for="username">Full Name:</label>
        <input type="text" id="username" name="username" placeholder="Enter your full name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>

        <input type="submit" value="Sign Up">
    </form>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const success = "{{ 'true' if success else 'false' }}";  // Ensure quotes for JavaScript
        const error = "{{ error if error else '' }}";  // Pass error as a string

        if (success === "true") {
            alert("Order Successful! Redirecting to the homepage...");
            window.location.href = "{{ url_for('home') }}";  // Redirect to index.html
        } else if (error) {
            alert(error);  // Show error message in alert
        }
    });
</script>

</body>
</html>
