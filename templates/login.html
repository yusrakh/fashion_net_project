<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion.net | Login</title>
    <style>
        body { background-color: #f9f9f9; font-family: Arial, sans-serif; }
        .login-container {
            max-width: 500px; margin: 50px auto; background-color: white;
            padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 10px;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        label { display: block; margin-bottom: 5px; color: #333; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 10px; margin-bottom: 20px;
            border: 1px solid #ccc; border-radius: 5px;
        }
        button[type="submit"] {
            width: 100%; padding: 12px; background-color: #333;
            color: white; border: none; border-radius: 5px; 
            cursor: pointer; font-size: 16px;
        }
        button[type="submit"]:hover { background-color: #4CAF50; }
        .error {
            background-color: #f8d7da; color: #721c24; padding: 10px;
            border-radius: 5px; text-align: center; margin-bottom: 10px;
            display: none;
        }
        .success {
            background-color: #d4edda; color: #155724; padding: 10px;
            border-radius: 5px; text-align: center; margin-bottom: 10px;
            display: none;
        }
        .signup-link { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Login to Your Account</h2>
    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>
    <form id="login-form">
        <label>Email:</label>
        <input type="email" id="email" 
               autocomplete="email" required>
        <label>Password:</label>
        <input type="password" id="password" 
               autocomplete="current-password" required>
        <button type="submit">Login</button>
    </form>
    <p class="signup-link">
        Don't have an account? 
        <a href="signup.html">Sign up here</a>
    </p>
</div>

<script>
const USER_SERVICE = 'https://fashion-user-service-audqffe9dve4dscm.southeastasia-01.azurewebsites.net';

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    try {
        const resp = await fetch(`${USER_SERVICE}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await resp.json();
        
        if (data.success) {
            localStorage.setItem('customer_id', data.customer_id);
            localStorage.setItem('username', data.username);
            successMsg.style.display = 'block';
            successMsg.innerText = `Welcome ${data.username}!`;
            setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Invalid email or password!';
        }
    } catch(err) {
        errorMsg.style.display = 'block';
        errorMsg.innerText = 'Service unavailable. Try again later.';
        console.error('Login error:', err);
    }
});
</script>
</body>
</html>
