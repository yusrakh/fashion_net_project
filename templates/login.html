<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion.net | Login</title>
    <style>
        body { background-color: #f9f9f9; font-family: Arial, sans-serif; }
        .login-container {
            max-width: 500px; margin: 50px auto;
            background-color: white; padding: 20px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        label { display: block; margin-bottom: 5px; color: #333; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 10px; margin-bottom: 20px;
            border: 1px solid #ccc; border-radius: 5px; font-size: 1em;
        }
        button[type="submit"] {
            width: 100%; padding: 15px; background-color: #333;
            color: white; border: none; border-radius: 5px;
            cursor: pointer; font-size: 1.1em;
        }
        button[type="submit"]:hover { background-color: #4CAF50; }
        .error { background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; text-align: center; display: none; }
        .success { background-color: #d4edda; color: #155724; padding: 10px; border-radius: 5px; text-align: center; display: none; }
        .signup-link { display: block; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Login to Your Account</h2>
    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>

    <form id="login-form">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>

    <p class="signup-link">Don't have an account? <a href="signup.html">Sign up here</a></p>
</div>

<script>
const USER_SERVICE = 'https://fashion-user-service-audqffe9dve4dscm.southeastasia-01.azurewebsites.net';

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const resp = await fetch(`${USER_SERVICE}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await resp.json();

        if (data.success) {
            localStorage.setItem('customer_id', data.customer_id);
            localStorage.setItem('username', data.username);
            document.getElementById('success-msg').style.display = 'block';
            document.getElementById('success-msg').innerText = `Welcome ${data.username}!`;
            setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').innerText = 'Invalid email or password!';
        }
    } catch(err) {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').innerText = 'Service unavailable. Try again.';
    }
});
</script>
</body>
</html>
