            <div class="filter-section">
                <label for="category">Category:</label>
                <select id="category">
                    <option value="">Select Category</option>

                    <option value="accessories">Accessories</option>
                    <option value="cosmetics">Cosmetics</option>
                </select>
            </div>
            <div class="filter-section">
                <label for="occasion">Occasion:</label>
                <select id="occasion">
                    <option value="">Select Occasion</option>
                    <option value="casual">Casual</option>
                    <option value="semi-formal">Semi-formal</option>
                    <option value="formal">Formal</option>
                    <option value="wedding">Wedding</option>
                </select>
            </div>
            <div class="sidebar-buttons">
                <button class="view-results" onclick="applyFilters()">View Results</button>
                <button class="clear-all" onclick="clearFilters()">Clear All</button>
            </div>
            

<!-- Results Section -->
<div id="results" class="results-container"></div>
        </div>
        
</section>

<script>
    function updateBudgetValue(value) {
        document.getElementById('budget-value').textContent = `PKR Rs{value}`;
    }
    function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('open');
}

function updateBudgetValue(value) {
    document.getElementById('budget-value').textContent = `PKR Rs{value}`;
}

function clearFilters() {
    document.querySelectorAll('.filter-section select, .filter-section input').forEach(input => {
        if (input.type === 'range') {
            input.value = input.min;
            updateBudgetValue(input.value);
        } else {
            input.value = '';
        }
    });
}

function applyFilters() {
    alert('Filters applied!');
}

</script>

function showCategories(brand) {
    const brandName = document.getElementById('brand-name');
    const subcategories = document.getElementById('subcategories');
    const categoriesDiv = document.getElementById('categories');

    brandName.innerText = brand;
    subcategories.innerHTML = '';

    Object.keys(brandCategories[brand]).forEach(category => {
        const categoryLink = document.createElement('span');
        categoryLink.className = 'subcategory-link';
        categoryLink.innerText = category;
        categoryLink.onclick = () => showProducts(brand, category);
        subcategories.appendChild(categoryLink);
    });

    categoriesDiv.style.display = 'block';
}

function showProducts(brand, category) {
    const productGrid = document.getElementById('product-grid');
    productGrid.innerHTML = 'Loading...';

    const localProducts = brandCategories[brand][category] || [];

    fetch(`https://fashion-product-service-b7atcad9dfe8g5e3.southeastasia-01.azurewebsites.net/api/brands/${brand.toLowerCase()}/products`)
        .then(res => res.json())
        .then(products => {
            productGrid.innerHTML = '';

            products.forEach((product, index) => {
                // Name se match karo — case insensitive
                const localData = localProducts.find(l => 
                    l.name.toLowerCase().includes(product.product_name.toLowerCase()) ||
                    product.product_name.toLowerCase().includes(l.name.toLowerCase())
                ) || localProducts[index] || {};

                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                const imageUrl = (localData.image || '').replace(/'/g, "");

                productCard.innerHTML = `
                    <img src="${imageUrl}" alt="${product.product_name}" 
                         style="width:150px; height:150px; object-fit:cover; border-radius:8px;">
                    <h4>${product.product_name}</h4>
                    <p>${localData.description || ''}</p>
                    <p><strong>PKR ${product.price}</strong></p>
                    <button onclick='addToCart(${product.product_id}, "${product.product_name}", ${product.price}, "${imageUrl}")'>
                        Add to Cart
                    </button>
                `;
                productGrid.appendChild(productCard);
            });
        })
        .catch(err => {
            productGrid.innerHTML = 'Error loading products';
            console.error(err);
        });
}

function convertToPKR(price) {
    if (!price) return "N/A";
    if (price.includes('PKR')) return parseFloat(price.replace('PKR', '').trim()).toFixed(2);
    if (price.includes('$')) return (parseFloat(price.replace('$', '')) * 280).toFixed(2);
    return "N/A";
}

function addToCart(id, name, price, image) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existing = cart.find(item => item.product_id === id);
    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({ 
            product_id: id, 
            name: name, 
            price: parseFloat(price),  // ← number rakho
            image: image, 
            quantity: 1 
        });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    alert("Added to cart!");
}


function displayCart() {
    const cartItems = document.getElementById('cart-items');
    const cart = JSON.parse(localStorage.getItem('cart')) || []; // Retrieve cart data from localStorage

    cartItems.innerHTML = ''; // Clear the existing cart items before updating

    if (cart.length === 0) {
        cartItems.innerHTML = '<p>Your cart is empty.</p>';
        return;
    }

    cart.forEach((item, index) => {
        const cartItem = document.createElement('div');
        cartItem.className = 'cart-item';
        cartItem.innerHTML = `
            <h4>${item.name} (Size: ${item.size})</h4>
            <img src="${item.image}" alt="${item.name}" width="50">
            <p>Price: ${item.price} PKR</p>
            <p>Quantity: ${item.quantity}</p>
            <button class="remove-button" onclick="removeFromCart(${index})">Remove</button>
        `;
        cartItems.appendChild(cartItem);
    });

    // Calculate the total
    const total = cart.reduce((total, item) => total + parseFloat(item.price) * item.quantity, 0);
    document.getElementById('cart-total').innerText = `Total: PKR ${total.toFixed(2)}`;
}

function removeFromCart(index) {
            cart.splice(index, 1); 
            localStorage.setItem('cart', JSON.stringify(cart)); 
            displayCart(); 
        }

        function proceedToCheckout() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
    }
    window.location.href = "/checkout.html";
}

function checkout() {
    const cart = JSON.parse(localStorage.getItem('cart')) || []; // Retrieve cart data from localStorage
    if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
    }

    // Calculate total payment
    const totalPayment = cart.reduce((total, item) => {
        const priceInPKR = parseFloat(item.price); // Assuming price is already in PKR
        return total + priceInPKR * item.quantity;
    }, 0);

    // Store total payment in local storage
    localStorage.setItem('totalPayment', totalPayment);

    // Redirect to checkout.html
    window.location.href = "/checkout.html";
    // This needs to be adjusted based on your backend routing
}
