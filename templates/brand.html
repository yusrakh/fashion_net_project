<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion.net - Brands</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #fafafa;
            --cream: #f5f0eb;
            --accent: #c8956c;
            --accent-dark: #a0714f;
            --gray: #6b6b6b;
            --light-gray: #e8e4df;
            --card-bg: #ffffff;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-hover: 0 12px 40px rgba(0,0,0,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background-color: var(--black);
            color: var(--white);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .filter-toggle {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .filter-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background-color: var(--white);
            box-shadow: 4px 0 30px rgba(0,0,0,0.15);
            padding: 30px 24px;
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar.open { left: 0; }

        .sidebar h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 24px;
            color: var(--black);
        }

        .close-sidebar {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--gray);
        }

        .filter-section { margin-bottom: 20px; }

        .filter-section label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .filter-section select,
        .filter-section input[type="range"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--light-gray);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            background: var(--cream);
            color: var(--black);
        }

        #budget-value {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.9rem;
            margin-top: 4px;
            display: block;
        }

        .sidebar-buttons { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }

        .sidebar-buttons button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .view-results { background-color: var(--black); color: var(--white); }
        .view-results:hover { background-color: var(--accent); }
        .clear-all { background-color: var(--light-gray); color: var(--black); }
        .clear-all:hover { background-color: #d0c8c0; }

        /* ── MAIN ── */
        main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* ── BRAND GRID ── */
        .brands-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--black);
            text-align: center;
            letter-spacing: 1px;
        }

        .brand-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            margin-bottom: 50px;
        }

        .brand-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .brand-item:hover { transform: translateY(-4px); }

        .brand-item img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            display: block;
            margin: 0 auto 12px;
            background-color: var(--white);
            border-radius: 16px;
            padding: 12px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.3s;
        }

        .brand-item:hover img { box-shadow: var(--shadow-hover); }

        /* ── SUBCATEGORY BUTTONS ── */
        .brand-item button {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .brand-item button:hover { background: var(--accent); }

        /* ── CATEGORIES SECTION ── */
        .category-grid { display: none; margin-bottom: 40px; }

        .category-grid h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--black);
            margin-bottom: 16px;
        }

        #subcategories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .subcategory-link {
            display: inline-block;
            padding: 8px 20px;
            background: var(--white);
            border: 1.5px solid var(--light-gray);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--black);
            text-decoration: none;
            transition: all 0.2s;
        }

        .subcategory-link:hover,
        .subcategory-link.active {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }

        /* ── PRODUCT GRID ── */
        .product-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: flex-start;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 0;
            width: 220px;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .product-card-body { padding: 16px; }

        .product-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            margin-bottom: 6px;
            color: var(--black);
            line-height: 1.3;
        }

        .product-card p {
            font-size: 0.78rem;
            color: var(--gray);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .product-price {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--accent-dark);
            margin-bottom: 12px;
        }

        .add-cart-btn {
            width: 100%;
            padding: 10px;
            background: var(--black);
            color: var(--white);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .add-cart-btn:hover { background: var(--accent); }

        /* ── CART SECTION ── */
        .cart-container {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: var(--shadow);
        }

        .cart-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: var(--black);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-badge {
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
        }

        #cart-items { display: flex; flex-direction: column; gap: 12px; }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--cream);
            border-radius: 12px;
            transition: background 0.2s;
        }

        .cart-item:hover { background: var(--light-gray); }

        .cart-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .cart-item-info { flex: 1; }

        .cart-item-info .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--black);
            margin-bottom: 2px;
        }

        .cart-item-info .item-qty {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .cart-item-price {
            font-weight: 600;
            color: var(--accent-dark);
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .remove-button {
            background: none;
            border: 1px solid #ddd;
            color: var(--gray);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
        }

        .remove-button:hover { background: #fee; border-color: #fcc; color: #c00; }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 0;
            margin-top: 16px;
            border-top: 2px solid var(--light-gray);
        }

        #cart-total {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--black);
        }

        .checkout-btn {
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 20px;
            width: 100%;
        }

        .checkout-btn:hover { background: var(--accent); transform: translateY(-2px); }

        .empty-cart {
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
            padding: 20px;
        }

        footer {
            background-color: var(--black);
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 24px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* Loading */
        .loading-text {
            text-align: center;
            color: var(--gray);
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <button class="filter-toggle" onclick="toggleSidebar()">☰ Filters</button>
    <h1>Fashion.net</h1>
    <span style="width:80px"></span>
</header>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
    <h3>Filters</h3>
    <div class="filter-section">
        <label>Size</label>
        <select id="size">
            <option value="">All Sizes</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
        </select>
    </div>
    <div class="filter-section">
        <label>Budget (PKR)</label>
        <input type="range" id="budget" min="100" max="25000" value="25000" oninput="updateBudgetValue(this.value)">
        <span id="budget-value">PKR 25000</span>
    </div>
    <div class="filter-section">
        <label>Category</label>
        <select id="category">
            <option value="">All Categories</option>
            <option value="clothing">Clothing</option>
            <option value="footwear">Footwear</option>
            <option value="accessories">Accessories</option>
            <option value="cosmetics">Cosmetics</option>
        </select>
    </div>
    <div class="filter-section">
        <label>Occasion</label>
        <select id="occasion">
            <option value="">All Occasions</option>
            <option value="casual">Casual</option>
            <option value="semi-formal">Semi-formal</option>
            <option value="formal">Formal</option>
            <option value="wedding">Wedding</option>
        </select>
    </div>
    <div class="sidebar-buttons">
        <button class="view-results" onclick="toggleSidebar()">Apply Filters</button>
        <button class="clear-all" onclick="clearFilters()">Clear All</button>
    </div>
</div>

<main>
    <!-- Brands -->
    <section class="brands-section">
        <h2>Our Brands</h2>
        <div class="brand-grid">
            <div class="brand-item" onclick="showCategories('ETHNIC')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRusOjwBKarDR6-GAmMVk2OlEovJuAUjzbKcw&s" alt="Ethnic">
                <button>Ethnic</button>
            </div>
            <div class="brand-item" onclick="showCategories('ZELLBURY')">
                <img src="https://www.hdcollection.com.pk/cdn/shop/collections/ZELLBURY_LOGO.jpg?v=1661787351" alt="Zellbury">
                <button>Zellbury</button>
            </div>
            <div class="brand-item" onclick="showCategories('SAPPHIRE')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRtaZsnpwVyl4BJ4EV36cJHTaYzG6tCRPY_7A&s" alt="Sapphire">
                <button>Sapphire</button>
            </div>
            <div class="brand-item" onclick="showCategories('OUTFITTERS')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSimi8twCTodEQs88YpzRQaDx__CIfABhSX7Q&s" alt="Outfitters">
                <button>Outfitters</button>
            </div>
            <div class="brand-item" onclick="showCategories('SAYA')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoiKgf83RBwT-qz_O2LlcksGv_RGcxnst_Og&s" alt="Saya">
                <button>Saya</button>
            </div>
        </div>
    </section>

    <!-- Categories + Products -->
    <div class="category-grid" id="categories">
        <h2 id="brand-name"></h2>
        <div id="subcategories"></div>
        <div class="product-grid" id="product-grid"></div>
    </div>

    <!-- Cart -->
    <div class="cart-container" id="cart">
        <h2>🛍 Shopping Cart <span class="cart-badge" id="cart-count">0</span></h2>
        <div id="cart-items"><p class="empty-cart">Your cart is empty.</p></div>
        <div class="cart-total-row">
            <span id="cart-total">Total: PKR 0.00</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
    </div>
</main>

<footer>
    <p>&copy; 2024 Fashion.net. All Rights Reserved.</p>
</footer>

// ── Show Categories ──
function showCategories(brand) {
    document.getElementById('brand-name').innerText = brand;
    const subcategories = document.getElementById('subcategories');
    subcategories.innerHTML = '';

    Object.keys(brandCategories[brand]).forEach(category => {
        const link = document.createElement('span');
        link.className = 'subcategory-link';
        link.innerText = category;
        link.onclick = () => {
            document.querySelectorAll('.subcategory-link').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            showProducts(brand, category);
        };
        subcategories.appendChild(link);
    });

    document.getElementById('categories').style.display = 'block';
    document.getElementById('product-grid').innerHTML = '<p class="loading-text">Select a category above ↑</p>';
}

// ── Show Products — API + Local Images, NO duplicates ──
function showProducts(brand, category) {
    const productGrid = document.getElementById('product-grid');
    productGrid.innerHTML = '<p class="loading-text">Loading...</p>';

    const localProducts = brandCategories[brand][category] || [];

    fetch(`https://fashion-product-service-b7atcad9dfe8g5e3.southeastasia-01.azurewebsites.net/api/brands/${brand.toLowerCase()}/products`)
        .then(res => res.json())
        .then(allProducts => {
            productGrid.innerHTML = '';

            // Only show products matching this category — by name
            const localNames = localProducts.map(l => l.name.toLowerCase());

            // Match API products to local category products
            const matched = [];
            localProducts.forEach((localItem, idx) => {
                const apiMatch = allProducts.find(p =>
                    p.product_name.toLowerCase().includes(localItem.name.toLowerCase().split(' ')[0]) ||
                    localItem.name.toLowerCase().includes(p.product_name.toLowerCase().split(' ')[0])
                );
                matched.push({
                    product_id: apiMatch ? apiMatch.product_id : (1000 + idx),
                    product_name: localItem.name,
                    price: apiMatch ? apiMatch.price : parseFloat(localItem.price.replace('PKR','').trim()),
                    image: localItem.image,
                    description: localItem.description
                });
            });

            if (matched.length === 0) {
                productGrid.innerHTML = '<p class="loading-text">No products found.</p>';
                return;
            }

            matched.forEach(product => {
                const imageUrl = product.image.replace(/'/g, "");
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${imageUrl}" alt="${product.product_name}" onerror="this.src='https://via.placeholder.com/220x200?text=No+Image'">
                    <div class="product-card-body">
                        <h4>${product.product_name}</h4>
                        <p>${product.description}</p>
                        <div class="product-price">PKR ${product.price}</div>
                        <button class="add-cart-btn" onclick='addToCart(${product.product_id}, "${product.product_name.replace(/"/g,"")}", ${product.price}, "${imageUrl}")'>
                            Add to Cart
                        </button>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        })
        .catch(err => {
            // Fallback to local data if API fails
            productGrid.innerHTML = '';
            localProducts.forEach((product, idx) => {
                const price = parseFloat(product.image.replace('PKR','').trim()) || parseFloat(product.price.replace('PKR','').trim());
                const imageUrl = product.image.replace(/'/g,"");
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${imageUrl}" alt="${product.name}">
                    <div class="product-card-body">
                        <h4>${product.name}</h4>
                        <p>${product.description}</p>
                        <div class="product-price">${product.price}</div>
                        <button class="add-cart-btn" onclick='addToCart(${1000+idx}, "${product.name.replace(/"/g,"")}", ${parseFloat(product.price.replace('PKR','').trim())}, "${imageUrl}")'>
                            Add to Cart
                        </button>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        });
}

// ── Add to Cart ──
function addToCart(id, name, price, image) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existing = cart.find(item => item.product_id === id);
    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({ product_id: id, name, price: parseFloat(price), image, quantity: 1 });
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    displayCart();
}

// ── Display Cart ──
function displayCart() {
    const cartItems = document.getElementById('cart-items');
    const cartCount = document.getElementById('cart-count');
    if (!cartItems) return;

    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    cartItems.innerHTML = '';

    if (cart.length === 0) {
        cartItems.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
        if (cartCount) cartCount.innerText = '0';
        document.getElementById('cart-total').innerText = 'Total: PKR 0.00';
        return;
    }

    let totalItems = 0;
    cart.forEach((item, index) => {
        totalItems += item.quantity;
        const cartItem = document.createElement('div');
        cartItem.className = 'cart-item';
        cartItem.innerHTML = `
            <img src="${item.image || 'https://via.placeholder.com/60'}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/60'">
            <div class="cart-item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-qty">Qty: ${item.quantity}</div>
            </div>
            <div class="cart-item-price">PKR ${(item.price * item.quantity).toFixed(2)}</div>
            <button class="remove-button" onclick="removeFromCart(${index})">✕</button>
        `;
        cartItems.appendChild(cartItem);
    });

    const total = cart.reduce((t, item) => t + item.price * item.quantity, 0);
    document.getElementById('cart-total').innerText = `Total: PKR ${total.toFixed(2)}`;
    if (cartCount) cartCount.innerText = totalItems;
}

// ── Remove from Cart ──
function removeFromCart(index) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    displayCart();
}

// ── Checkout ──
function checkout() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
    }
    window.location.href = '/checkout.html';
}
