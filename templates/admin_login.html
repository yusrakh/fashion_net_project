<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Admin Login</title>  
    <style>  
        body {  
            font-family: Arial, sans-serif;  
            background-color: #f9f9f9;  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            height: 100vh;  
            margin: 0;  
        }  
        
        .login-container {  
            background-color: white;  
            padding: 30px;  
            border-radius: 10px;  
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);  
            width: 300px;  
        }  

        h2 {  
            text-align: center;  
            color: #333;  
            margin-bottom: 20px;  
        }  

        label {  
            display: block;  
            margin-bottom: 5px;  
            color: #333;  
            font-weight: bold;  
        }  

        input[type="text"],  
        input[type="password"] {  
            width: 100%;  
            padding: 10px;  
            margin-bottom: 20px;  
            border: 1px solid #ddd;  
            border-radius: 5px;  
        }  

        input[type="submit"] {  
            width: 100%;  
            padding: 10px;  
            background-color: #007bff; /* Default color */  
            color: white;  
            border: none;  
            border-radius: 5px;  
            cursor: pointer;  
            font-size: 16px;  
            transition: background-color 0.3s; /* Smooth transition */  
        }  

        input[type="submit"]:hover {  
            background-color: #0056b3; /* Color on hover */  
        }  

        input[type="submit"]:active {  
            background-color: #28a745; /* Green color when clicked */  
        }  

        .error {  
            text-align: center;  
            margin-bottom: 10px;  
            color: #d9534f;  
        }  
    </style>  
</head>  
<body>  
    <div class="login-container">  
        <h2>Admin Login</h2>  
        <!-- Error message -->  
        {% if error %}  
        <div class="error">{{ error }}</div>  
        {% endif %}  
        <form action="{{ url_for('admin_login') }}" method="POST">  
            <label for="username">Username:</label>  
            <input type="text" id="username" name="username" placeholder="Admin username" required>  
            
            <label for="password">Password:</label>  
            <input type="password" id="password" name="password" placeholder="Admin password" required>  
            
            <input type="submit" class="btn btn-primary" value="Login">  
        </form>  
        
    </div>  
</body>  
</html>
