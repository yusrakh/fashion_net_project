<!-- category.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover top fashion products in various categories at Fashion.net. Shop the latest trends in women's fashion, men's fashion, and more.">
    <meta property="og:title" content="Fashion.net - Women's Fashion">
    <meta property="og:description" content="Find the best women's fashion at Fashion.net. Browse our collection of stylish and trendy clothing.">
    <meta property="og:image" content="https://example.com/yourimage.jpg">
    <title>Fashion.net - Category</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
</head>
    <style>
        .product-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .product-item {
            text-align: center;
            margin: 20px;
        }

        .product-item img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
    </style>

<body>
    <header>
        <h1>Fashion.net - Category</h1>
    </header>

    <section id="products">
        <h2>Products for <span id="category-name"></span></h2>
        <div class="product-grid" id="product-grid">
            <!-- Products will be dynamically inserted here -->
        </div>
    </section>

    <footer>
        <p>All rights reserved. Fashion.net © 2024</p>
    </footer>

    <script>
        const productCatalog = {
            ethnic: {
                "women's traditional": [
                    { name: "Ethnic Dress 1", image: "images/ethnic_dress1.jpg", price: "$50" },
                    { name: "Ethnic Dress 2", image: "images/ethnic_dress2.jpg", price: "$60" }
                ],
                "men's kurta": [
                    { name: "Men's Kurta 1", image: "images/mens_kurta1.jpg", price: "$40" },
                    { name: "Men's Kurta 2", image: "images/mens_kurta2.jpg", price: "$45" }
                ],
                // Add more categories and products as needed
            },
            zellbury: {
                "casual wear": [
                    { name: "Casual Shirt 1", image: "images/zellbury_casual1.jpg", price: "$35" },
                    { name: "Casual Shirt 2", image: "images/zellbury_casual2.jpg", price: "$40" }
                ],
                // Add more categories and products as needed
            },
            // Add entries for sapphire, outfitters, saya, etc.
        };

        // Helper function to capitalize words in category names
        function capitalizeWords(str) {
            return str.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        const params = new URLSearchParams(window.location.search);
        const brand = params.get('brand');
        const category = params.get('category');

        // Update the category name on the page
        document.getElementById('category-name').innerText = capitalizeWords(category);

        // Populate products based on brand and category
        const products = productCatalog[brand][category.replace(/-/g, " ")];
        const productGrid = document.getElementById('product-grid');
        products.forEach(product => {
            const productItem = document.createElement('div');
            productItem.className = 'product-item';
            productItem.innerHTML = `
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p>Price: ${product.price}</p>
                <a href="product.html?brand=${brand}&category=${category}&product=${product.name.replace(/\s+/g, '-').toLowerCase()}">View Details</a>
            `;
            productGrid.appendChild(productItem);
        });

        // Function to show the login modal periodically
        window.showLoginModal = function () {
            if (!localStorage.getItem('modalDismissed')) {
                $('#loginModal').modal('show');
            }
        };

        // Function to dismiss the modal
        window.dismissModal = function () {
            $('#loginModal').modal('hide');
            localStorage.setItem('modalDismissed', 'true');
        };

        // Show modal every 2 minutes
        setInterval(showLoginModal, 120000);
    </script>
</body>

</html>
